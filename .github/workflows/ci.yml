name: CI
on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION_LOWEST: 22.x
  NODE_VERSION_HIGHEST: 26.x

jobs:

  misc:
    name: Tooling checks
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Ensure line endings are consistent
        run: git config --global core.autocrlf input
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Use Node.js ${{ env.NODE_VERSION_LOWEST }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION_LOWEST }}
          cache: yarn
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Build TypeScript with esModuleInterop flag
        run: yarn run build:ts --esModuleInterop true
      - name: Run linter
        run: yarn run lint
      - name: Run depcheck
        run: yarn run depcheck
      - name: Test clean script
        run: yarn run clean

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version:
          - 22.x
          - 24.x
          - 26.x
    steps:
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Ensure line endings are consistent
        run: git config --global core.autocrlf input
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Load cache
        uses: actions/cache@v5
        with:
          path: |
            **/node_modules
          key: ${{ runner.os }}-test-modules-v1-${{ hashFiles('**/yarn.lock') }}
      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-engines
      - name: Build project
        run: yarn run build
      - name: Run tests
        run: yarn run test-ci
      #        Needed until https://github.com/coverallsapp/github-action/pull/265
      - name: Trust Coveralls Homebrew tap (Homebrew 6 requirement)
        if: runner.os == 'macOS'
        run: brew trust coverallsapp/coveralls
      - name: Submit coverage results
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.github_token }}
          flag-name: run-${{ matrix.node-version }}
          parallel: true
      - name: Run integration tests
        run: npx lerna run integration --concurrency 1

  spectest:
    name: Specification tests
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest
        node-version:
          - 22.x
          - 24.x
          - 26.x
    runs-on: ${{ matrix.os }}
    steps:
      - name: Ensure line endings are consistent
        run: git config --global core.autocrlf input
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: yarn
      - name: Install dependencies and build
        run: yarn install --frozen-lockfile --network-timeout 36000
      - name: Load RDF test suite cache
        uses: actions/cache@v5
        with:
          path: |
            .rdf-test-suite-cache
            .rdf-test-suite-ldf-cache
          key: ${{ runner.os }}-rdftestsuite-${{ secrets.CACHE_VERSION }}-${{ hashFiles('yarn.lock') }}
      - name: Run specification tests
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          # Retry because of https://github.com/rubensworks/rdf-test-suite.js/issues/64
          command: yarn run test:spec
      - name: Run integration tests
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          # Retry because of https://github.com/rubensworks/rdf-test-suite.js/issues/64
          command: yarn run test:integration

  browsertest:
    name: Browser tests
    runs-on: ubuntu-latest
    steps:
      - name: Ensure line endings are consistent
        run: git config --global core.autocrlf input
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Use Node.js ${{ env.NODE_VERSION_LOWEST }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION_LOWEST }}
          cache: yarn
      - name: Install dependencies and build
        run: yarn install --frozen-lockfile
      - name: Build browser bundles
        run: yarn run build:browser
      - name: Install Playwright browsers
        run: yarn playwright install --with-deps
      - name: Run browser tests
        run: yarn run test:browser

  coveralls:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Consolidate test coverage from different jobs
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.github_token }}
          parallel-finished: true

  browserbuilds:
    name: Browser builds
    needs:
      - misc
      - test
      - spectest
      - browsertest
    runs-on: ubuntu-latest
    steps:
      - name: Ensure line endings are consistent
        run: git config --global core.autocrlf input
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Use Node.js ${{ env.NODE_VERSION_LOWEST }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION_LOWEST }}
          cache: yarn
      - name: Install dependencies and build
        run: yarn install --frozen-lockfile
      - name: Build browser bundles
        run: yarn run build:browser
      - name: Deploy browser builds
        if: startsWith(github.ref, 'refs/heads/master') || startsWith(github.ref, 'refs/tags/')
        run: ./.github/deploy_browser.sh
        env:
          GH_TOKEN: ${{ secrets.PAT }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26.x
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Load cache
        uses: actions/cache@v5
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-lint-modules-v1-${{ hashFiles('**/yarn.lock') }}
      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-engines
      - name: Run linter
        run: yarn run lint

  docker:
    needs:
      - test
      - lint
    runs-on: ubuntu-latest
    steps:
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26.x
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Load cache
        uses: actions/cache@v5
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-docker-modules-v1-${{ hashFiles('**/yarn.lock') }}
      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-engines
      - name: Install Lerna Docker
        run: sh -c "`curl -fsSl https://raw.githubusercontent.com/rubensworks/lerna-docker/master/install.sh`"
      - name: Build Docker images
        run: ~/.lerna-docker/bin/lerna-docker comunica build
  #   - name: Deploy Docker images
  #     if: startsWith(github.ref, 'refs/heads/master') || startsWith(github.ref, 'refs/tags/')
  #     run: ~/.lerna-docker/bin/lerna-docker comunica push
  #     env:
  #       DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  #       DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  documentation:
    name: Prepare documentation
    runs-on: ubuntu-latest
    steps:
      - name: Ensure line endings are consistent
        run: git config --global core.autocrlf input
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Use Node.js ${{ env.NODE_VERSION_LOWEST }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION_LOWEST }}
          cache: yarn
      - name: Install dependencies
        run: yarn install --ignore-scripts --frozen-lockfile
      - name: Build documentation
        run: yarn run doc
      - name: Prepare artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: documentation
          name: documentation

  documentation-publish:
    name: Publish documentation
    needs:
      - misc
      - test
      - spectest
      - browsertest
      - documentation
    runs-on: ubuntu-latest
    # The documentation is only published for master branch
    if: startsWith(github.ref, 'refs/heads/master')
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: documentation
